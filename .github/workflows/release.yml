name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test

      - name: Ensure tag matches package.json version
        run: node -e "const v=require('./package.json').version; const tag=process.env.GITHUB_REF_NAME; if(tag!==`v${v}`){console.error(`Tag ${tag} does not match package.json version v${v}`); process.exit(1);}"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build release artifact
        run: |
          npm pack
          ls -la *.tgz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            ./*.tgz
