# context-handoff aliases
# Append this to your .aider.conf.yml

aliases:
  handoff-export: |
    Generate handoff.md in project root with this schema:
    # 🤝 Context Handoff
    ## Meta (exported_at, exported_from: aider, session_id)
    ## Project (name, stack, root, package_manager)
    ## Current Task (one paragraph)
    ## Progress (checklist [x]/[ ])
    ## Active Files (path — description)
    ## Blocker (exact error or None)
    ## Key Decisions (bullet list)
    ## Environment (versions, env vars, dev command)
    ## Next Steps (ordered list)
    ## For the Next AI (imperative instructions)
    After: "✅ handoff.md written. Run /handoff-load in next tool."

  handoff-load: |
    Read handoff.md from project root.
    If missing: "❌ No handoff.md found. Run /handoff-export first."
    If found: read it + all Active Files, confirm with summary, start Next Steps #1.
    Follow "For the Next AI" exactly. Never change Key Decisions without flagging.
